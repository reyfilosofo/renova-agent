name: Renova RSR CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: rsr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  structure:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate RSR lab structure
        run: |
          test -f AGENTS.md
          test -f .env.example
          test -f docs/security-secrets.md
          test -f labs/renova-nous-rsr-lab/README.md
          test -d labs/renova-nous-rsr-lab/docs
          test -d labs/renova-nous-rsr-lab/products
          test -d labs/renova-nous-rsr-lab/tasks
          echo "Renova RSR Lab structure OK"
