name: Verify

on:
  pull_request:
  push:
    branches:
      - main
      - setup-ruflo-codex

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Python package
        run: python -m pip install -e '.[dev]'

      - name: Verify repository
        run: npm run verify
