name: Verify

on:
  pull_request:
  push:
    branches:
      - main
      - setup-ruflo-codex
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Core · Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: "24"

      - name: Install Python package
        run: python -m pip install -e '.[dev]'

      - name: Verify core repository
        run: npm run verify

      - name: Build Python wheel
        run: python -m pip wheel . --no-deps --wheel-dir dist

  web3:
    name: Web3 · compile and test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web3-starter/package-lock.json

      - name: Install locked Web3 dependencies
        run: npm --prefix web3-starter ci

      - name: Verify Web3 starter
        run: npm --prefix web3-starter run verify

  pages-artifact:
    name: Pages · public boundary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Build allowlisted Pages tree
        run: bash scripts/build-pages-site.sh

      - name: Confirm private paths are absent
        run: |
          test ! -e _site/.git
          test ! -e _site/.env
          test ! -e _site/config
          test ! -e _site/memory
          test ! -e _site/node_modules
