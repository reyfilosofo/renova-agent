name: Verify

on:
  pull_request:
  push:
    branches:
      - main
      - setup-ruflo-codex

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Python package
        run: python -m pip install -e '.[dev]'

      - name: Verify repository
        run: npm run verify
