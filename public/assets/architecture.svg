      <text x="28" y="122" fill="#B9B2A3" font-size="16">ℛenova thesis, principles, terms</text>
    </g>
    <g transform="translate(400 190)">
      <rect width="250" height="150" rx="24" fill="#14141C" stroke="#5472FF" stroke-opacity="0.55"/>
