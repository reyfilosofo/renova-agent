  <text x="70" y="84" fill="#F5F2EA" font-family="Georgia, serif" font-size="44">RENOVA Agent Architecture</text>
  <text x="70" y="126" fill="#B9B2A3" font-family="Arial, sans-serif" font-size="21">From philosophical thesis to operating interface, data structure and publication system.</text>
  <g font-family="Arial, sans-serif">
